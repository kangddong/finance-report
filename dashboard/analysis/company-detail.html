<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>기업 분석 | Premium Finance</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
    <style>
        .wrap { max-width: 920px; margin: 0 auto; padding: 2rem 1rem 4rem; }
        .back { color: var(--text-secondary); text-decoration: none; display: inline-flex; margin-bottom: 2rem; }
        .back:hover { color: var(--accent-blue); }
        .cardx { background: var(--card-bg); border: 1px solid var(--glass-border); border-radius: 32px; padding: 3rem; backdrop-filter: blur(25px); }
        h1 { font-size: 2.6rem; margin-bottom: .6rem; background: linear-gradient(135deg, #fff 0%, #a5f3fc 100%); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
        .sub { color: var(--text-secondary); margin-bottom: 2rem; padding-bottom: 1.4rem; border-bottom: 1px solid rgba(255,255,255,.1); }
        .ticker { color: var(--accent-blue); font-size: .9rem; font-weight: 700; letter-spacing: .08rem; text-transform: uppercase; margin-bottom: .6rem; }
        h2 { color: var(--accent-blue); margin: 2rem 0 1rem; }
        p { line-height: 1.8; color: var(--text-primary); }
        .not-found { color: var(--text-secondary); }
    </style>
</head>

<body>
    <div class="wrap">
        <a href="../index.html" class="back">← 대시보드로 돌아가기</a>
        <main class="cardx">
            <div id="content">
                <p class="not-found">기업 분석 데이터를 불러오는 중입니다...</p>
            </div>
        </main>
    </div>

    <script src="../js/utils.js"></script>
    <script src="../js/load-data.js"></script>
    <script src="../js/render-company-detail.js"></script>
</body>

</html>
